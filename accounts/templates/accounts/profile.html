{% extends 'base.html' %}
{% block title %}Mi perfil{% endblock %}
{% load static %}

{% block content %}
<div class="max-w-lg p-8 mx-auto mt-10 bg-white rounded-lg shadow">
    <h2 class="mb-6 text-2xl font-bold text-center">👤 Mi Perfil</h2>

    <!-- {% if messages %}
        {% for message in messages %}
            <div class="p-3 mb-4 text-center text-green-700 bg-green-100 rounded">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %} -->

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="flex flex-col items-center mb-4">
            {% if user.profile.image %}
                <img src="{{ user.profile.image.url }}" alt="Foto de perfil" class="w-24 h-24 mb-2 rounded-full">
            {% else %}
                <img src="{{ MEDIA_URL }}profile_pics/default.png" alt="Foto de perfil" class="w-24 h-24 mb-2 rounded-full">
            {% endif %}

            <div class="flex gap-4 items-center h-10">
                <label class="block font-semibold w-2/3">Cambiar foto:</label>
                {{ form.image }}                 
                <button type="submit" name="eliminar" class="bg-red-500 text-white rounded hover:bg-red-600
                        transition">
                        🗑️ Borrar foto
                </button>
                
            </div>  
            
        </div>



        <div class="mb-4">
            <label class="block font-semibold">Usuario:</label>
            <input type="text" value="{{ user.username }}" class="w-full p-2 bg-gray-100 border rounded" readonly>
        </div>

        <div class="mb-4">
            <label class="block font-semibold">Correo electrónico:</label>
            <input type="email" name="email" value="{{ user.email }}" class="w-full p-2 border rounded">
        </div>

        <div class="mb-4">
            <label class="block font-semibold">Teléfono:</label>
            {{ form.phone }}
        </div>

        <div class="mb-4">
            <label class="block font-semibold">Dirección:</label>
            {{ form.address }}
        </div>

        <button type="submit" name="guardar" class="w-full py-2 text-white bg-blue-600 rounded hover:bg-blue-700">
            Guardar cambios
        </button>
    </form>
</div>
{% endblock %}
